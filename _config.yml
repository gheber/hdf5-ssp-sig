title: HDF5 Security
description: Security policies and vulnerability disclosure for the HDF5 ecosystem

remote_theme: just-the-docs/just-the-docs

url: ""
baseurl: ""

# Colors - HDF5 brand colors
color_scheme: hdf5

# Logo
logo: "/assets/images/HDF-transparent.png"

# Navigation
nav_enabled: true
heading_anchors: true

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Footer
footer_content: "Copyright &copy; 2006 The HDF Group. Distributed under the <a href=\"https://github.com/HDFGroup/hdf5/blob/develop/LICENSE\">BSD License</a>.<br>This material is based upon <a href=\"https://www.hdfgroup.org/projects/hdf5-shines/\">work</a> supported by the U.S. National Science Foundation under Federal Award No. 2534078. Any opinions, findings, and conclusions or recommendations expressed in this material are those of the author(s) and do not necessarily reflect the views of the National Science Foundation."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Aux links (top right)
aux_links:
  "HDF5 on GitHub":
    - "https://github.com/HDFGroup/hdf5"
  "Report a Vulnerability":
    - "https://github.com/HDFGroup/hdf5/security/advisories/new"

aux_links_new_tab: true

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-redirect-from

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - tests
  - models/
  - audit/
  - templates/
  - README.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - GOVERNANCE.md
  - DECISION_LOG.md
  - CHARTER.md
  - SECURITY.md
  - "*.sh"
  # Exclude other policy files (only keep Vulnerability_Disclosure_Policy.md)
  - "policy/Secure SDLC & Code Review Policy.md"
  - "policy/Plugin and Extension Governance Policy.md"
  - "policy/Incident Response & Evidence Retention Policy.md"
  - "policy/Dependency & Licensing Policy.md"
  - "policy/README.md"
  - "policy/Compatibility & Lifecycle Support Policy.md"
  - "policy/Secure Build, Provenance, & Distribution Policy.md"
  - "policy/Security Testing & Fuzzing Policy.md"
  - "policy/Threat Modeling & Security Architecture Policy.md"
  - "policy/Release & Change Control Policy.md"
  - "policy/OSPS  -> SHINES Coverage Matrix.md"
  - "policy/Data Handling & Privacy Policy.md"
  - "policy/Governance - SSP Special Interest Group Charter.md"
  - "policy/Secure Configuration & Hardening Policy.md"
  - "policy/Cryptography & Key Management Policy.md"
  - "policy/Vulnerability Management & Disclosure (PSIRT) Policy.md"
